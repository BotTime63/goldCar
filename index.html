<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes">

<meta name="referrer"
      content="no-referrer">

<title>Media Viewer V3</title>

<style>

*{

    box-sizing:border-box;

}

html{

    scroll-behavior:smooth;

}

body{

    margin:0;

    padding:0;

    overflow-x:hidden;

    background:#000;

    color:#e0e0e0;

    font-family:Arial,Helvetica,sans-serif;

    text-align:center;

    user-select:none;

}

h1{

    margin:15px 0;

    font-size:28px;

    font-weight:bold;

}

a{

    color:#00AAFF;

}

img{

    -webkit-user-drag:none;

    user-select:none;

}

    /* ==========================================================
   MEDIA DISPLAY
========================================================== */

.media-container{

    width:100vw;

    display:flex;

    flex-direction:column;

    align-items:center;

    margin:0;

    padding:0 0 15px 0;

}

.media-container img,
.media-container video{

    width:auto;

    max-width:100vw;

    max-height:85vh;

    height:auto;

    object-fit:contain;

    background:#000;

    display:block;

    touch-action:pan-x pan-y pinch-zoom;

}

.media-number{

    margin:6px 0 4px;

    font-size:12px;

    opacity:.55;

}

.media-container a{

    width:95%;

    margin:6px 0 10px;

    font-size:11px;

    word-break:break-all;

    text-decoration:none;

}

/* ==========================================================
   HEART BUTTON
========================================================== */

.heart-btn{

    border:none;

    background:transparent;

    color:#ffffff;

    font-size:28px;

    cursor:pointer;

    padding:0;

    margin:5px 0;

    transition:transform .15s ease;

}

.heart-btn:hover{

    transform:scale(1.15);

}

.heart-btn.active{

    color:#ff2d55;

}

/* ==========================================================
   SEARCH
========================================================== */

#searchInput{

    width:90%;

    max-width:450px;

    margin:10px auto;

    padding:10px;

    font-size:16px;

    border:none;

    border-radius:8px;

    outline:none;

}

/* ==========================================================
   BUTTONS
========================================================== */

button{

    padding:10px 18px;

    margin:5px;

    font-size:14px;

    border:none;

    border-radius:7px;

    cursor:pointer;

    color:#fff;

    background:#4CAF50;

    transition:background .15s ease;

}

button:hover{

    background:#45A049;

}

.random-btn{

    background:#8e44ad;

}

.random-btn:hover{

    background:#732d91;

}

.heart-mode-btn{

    background:#e91e63;

}

.heart-mode-btn:hover{

    background:#c2185b;

}

.clear-btn{

    background:#d35400;

}

.clear-btn:hover{

    background:#b84300;

}

    /* ==========================================================
   CONTROLS
========================================================== */

.controls{

    width:100%;

    text-align:center;

}

#topControls{

    margin-top:10px;

}

#bottomControls{

    padding-bottom:25px;

}

/* ==========================================================
   STATUS
========================================================== */

#status{

    color:#ff6666;

    font-size:14px;

    margin:10px;

    min-height:20px;

}

/* ==========================================================
   WELCOME BANNER
========================================================== */

#welcomeBanner{

    position:fixed;

    top:20px;

    left:50%;

    transform:translateX(-50%);

    width:90%;

    max-width:450px;

    background:#222;

    color:#fff;

    padding:15px;

    border-radius:10px;

    box-shadow:0 4px 18px rgba(255,255,255,.15);

    display:none;

    z-index:9000;

}

/* ==========================================================
   LOGIN
========================================================== */

#loginScreen{

    position:fixed;

    inset:0;

    background:#000;

    display:flex;

    justify-content:center;

    align-items:center;

    z-index:9999;

}

#loginBox{

    background:#1f1f1f;

    padding:25px;

    border-radius:12px;

    width:90%;

    max-width:360px;

}

#passwordInput{

    width:100%;

    padding:10px;

    font-size:16px;

    border:none;

    border-radius:6px;

    outline:none;

}

/* ==========================================================
   APP
========================================================== */

#app{

    display:none;

}

.hidden{

    display:none !important;

}

</style>

</head>


<body>


<!-- ==========================================================
     WELCOME MESSAGE
========================================================== -->

<div id="welcomeBanner">

    ✅ Tracking enabled.<br><br>

    You will not see the same media twice<br>

    on this device.

</div>



<!-- ==========================================================
     LOGIN SCREEN
========================================================== -->

<div id="loginScreen">

    <div id="loginBox">


        <h2>

            Enter Password

        </h2>


        <input

            id="passwordInput"

            type="password"

            placeholder="Password"

        >


        <br><br>


        <button id="loginButton">

            Enter

        </button>



        <div

            id="loginError"

            style="color:red;margin-top:10px;">

        </div>


    </div>

</div>




<!-- ==========================================================
     APPLICATION
========================================================== -->

<div id="app">



<h1>

    Media Viewer V3

</h1>



<!-- SEARCH -->

<input

    id="searchInput"

    type="text"

    placeholder="Search by URL or number..."

>




<!-- TOP BUTTONS -->

<div

    id="topControls"

    class="controls">

</div>




<!-- STATUS -->

<div

    id="status">

</div>




<!-- MEDIA -->

<div

    id="mediaContainer">

</div>




<!-- BOTTOM BUTTONS -->

<div

    id="bottomControls"

    class="controls">

</div>



</div>




<!-- ==========================================================
     JAVASCRIPT START
========================================================== -->

<script>


    /* ==========================================================
   LOGIN SYSTEM
========================================================== */

function checkPassword(){


    const password =
        document
        .getElementById("passwordInput")
        .value;



    if(password === "12345"){


        document
        .getElementById("loginScreen")
        .style.display="none";


        document
        .getElementById("app")
        .style.display="block";


    }

    else{


        document
        .getElementById("loginError")
        .textContent =
        "Wrong password";


    }

}



document
.getElementById("loginButton")
.addEventListener(
    "click",
    checkPassword
);




/* ==========================================================
   CONFIGURATION
========================================================== */


const PAGE_SIZE = 15;

const SEARCH_DELAY = 250;



let mediaUrls = [];

let workingList = [];

let currentIndex = 0;

let searchTimer = null;



/* ==========================================================
   LOCAL STORAGE KEYS
========================================================== */


const STORAGE = {


    seen:
    "mediaViewerSeen",


    hearts:
    "mediaViewerHearts",


    heartMode:
    "mediaViewerHeartMode",


    random:
    "mediaViewerRandomState",


    visited:
    "mediaViewerVisited"


};




/* ==========================================================
   LOAD SAVED DATA
========================================================== */


let seenItems = new Set(

    JSON.parse(

        localStorage.getItem(
            STORAGE.seen
        )
        ||
        "[]"

    )

);



let heartedItems = new Set(

    JSON.parse(

        localStorage.getItem(
            STORAGE.hearts
        )
        ||
        "[]"

    )

);



let heartMode =

    localStorage.getItem(
        STORAGE.heartMode
    )
    ===
    "true";




let randomState =

    JSON.parse(

        localStorage.getItem(
            STORAGE.random
        )
        ||
        "{}"

    );





/* ==========================================================
   SAVE FUNCTIONS
========================================================== */


function saveSeen(){


    localStorage.setItem(

        STORAGE.seen,

        JSON.stringify(
            [...seenItems]
        )

    );

}




function saveHearts(){


    localStorage.setItem(

        STORAGE.hearts,

        JSON.stringify(
            [...heartedItems]
        )

    );

}




function saveSettings(){


    localStorage.setItem(

        STORAGE.heartMode,

        heartMode.toString()

    );

}




function saveRandomState(){


    localStorage.setItem(

        STORAGE.random,

        JSON.stringify(
            randomState
        )

    );

}




function saveAll(){


    saveSeen();

    saveHearts();

    saveSettings();

    saveRandomState();

}





/* ==========================================================
   FIRST VISIT MESSAGE
========================================================== */


function showWelcome(){


    const visited =

        localStorage.getItem(
            STORAGE.visited
        );



    if(!visited){


        const banner =

            document
            .getElementById(
                "welcomeBanner"
            );



        banner.style.display="block";



        setTimeout(()=>{


            banner.style.display="none";


        },5000);



        localStorage.setItem(

            STORAGE.visited,

            "true"

        );


    }

}


    /* ==========================================================
   MEDIA DETECTION
========================================================== */


function isImage(url){


    return (

        /\.(jpeg|jpg|png|gif|webp|heic|avif|bmp)$/i
        .test(url)

        ||

        url.includes("pbs.twimg.com")

        ||

        url.includes("abs.twimg.com")

    );

}




function isVideo(url){


    return (

        /\.(mp4|webm|mov|m4v)$/i
        .test(url)

        ||

        url.includes("video.twimg.com")

    );

}





function normalizeImageURL(url){


    let src = url;



    if(

        src.includes("imgur.com/")

        &&

        !src.includes("i.imgur.com")

    ){

        src =
        src.replace(
            "imgur.com/",
            "i.imgur.com/"
        )
        +
        ".jpg";

    }



    return src;

}





function createMediaElement(item){


    let element = null;



    if(isVideo(item.url)){


        const video =
        document.createElement("video");


        video.src =
        item.url;


        video.controls = true;


        video.playsInline = true;


        video.preload = "metadata";

        video.onloadeddata = () => {
    markAsSeen(item);
};


        element = video;


    }

    else if(isImage(item.url)){


    const img =
    document.createElement("img");


    img.src =
    normalizeImageURL(
        item.url
    );


    img.loading = "auto";


    img.decoding =
    "async";

    img.onload = () => {
    markAsSeen(item);
};

img.onerror = () => {
    img.style.display = "none";
};


    element = img;


}



    return element;

}





/* ==========================================================
   HELPERS
========================================================== */


function snapToTop(){


    window.scrollTo({

        top:0,

        behavior:"smooth"

    });


}





function shuffleArray(array){


    for(

        let i=array.length-1;

        i>0;

        i--

    ){


        const j =
        Math.floor(
            Math.random()
            *
            (i+1)
        );



        [

            array[i],

            array[j]

        ] = [

            array[j],

            array[i]

        ];


    }



    return array;

}











/* ==========================================================
   SEARCH SYSTEM
========================================================== */


function applySearch(){


    workingList =
    buildDisplayList();



    currentIndex = 0;



    render();



    snapToTop();

}





function debouncedSearch(){


    clearTimeout(
        searchTimer
    );



    searchTimer =

        setTimeout(

            applySearch,

            SEARCH_DELAY

        );


}





/* ==========================================================
   HEART SYSTEM
========================================================== */


function toggleHeart(index){


    if(
        heartedItems.has(index)
    ){

        heartedItems.delete(index);

    }

    else{

        heartedItems.add(index);

    }



    saveHearts();



    const buttons =
    document.querySelectorAll(
        ".heart-btn"
    );



    buttons.forEach(btn=>{


        if(
            Number(btn.dataset.index)
            ===
            index
        ){


            const active =
            heartedItems.has(index);



            btn.textContent =
            active
            ?
            "❤️"
            :
            "♡";



            if(active){

                btn.classList.add(
                    "active"
                );

            }

            else{

                btn.classList.remove(
                    "active"
                );

            }

        }


    });



    /*
       If we are inside Hearts mode
       and remove a heart,
       rebuild the list.
    */

    if(

        heartMode

        &&

        !heartedItems.has(index)

    ){

        applySearch();

    }


}





function showHeartedOnly(){


    heartMode = !heartMode;


    saveSettings();


    workingList =
    buildDisplayList();


    currentIndex = 0;


    render();


    snapToTop();


}





function clearHearts(){


    if(
        !confirm(
            "Clear all hearts?"
        )
    ){

        return;

    }


    heartedItems.clear();


    saveHearts();


    const buttons =
    document.querySelectorAll(
        ".heart-btn"
    );


    buttons.forEach(btn=>{

        btn.textContent = "♡";

        btn.classList.remove(
            "active"
        );

    });


}







/* ==========================================================
   BUILD DISPLAY LIST
========================================================== */


function buildDisplayList(){

    let list = [...mediaUrls];

    const query =
        document
        .getElementById("searchInput")
        .value
        .toLowerCase()
        .trim();


    if(query){

        const number =
        query.replace("#","");

        list =
        list.filter(item =>

            item.url
            .toLowerCase()
            .includes(query)

            ||

            item.index.toString() === number

        );

    }
    else{

        list =
        list.filter(item =>
            !seenItems.has(item.index)
        );

    }


    if(heartMode){

        list =
        list.filter(item =>
            heartedItems.has(item.index)
        );

    }


    shuffleArray(list);

    return list;

}





/* ==========================================================
   TRACK VIEWED MEDIA
========================================================== */


function markAsSeen(item){


    if(item && item.index){


        seenItems.add(
            item.index
        );


        saveSeen();


    }

}


    /* ==========================================================
   RENDER SYSTEM
========================================================== */


function renderControls(){


    const html = `


        <button
            class="random-btn"
            onclick="nextRandomPage()">

            🎲 Random Page

        </button>



        <button
            class="heart-mode-btn"
            onclick="showHeartedOnly()">

            ${

                heartMode

                ?

                "❤️ Showing Hearts"

                :

                "♡ Hearts"

            }

        </button>



        <button
            class="clear-btn"
            onclick="clearHearts()">

            🗑 Clear Hearts

        </button>


    `;



    document
    .getElementById(
        "topControls"
    )
    .innerHTML = html;



    document
    .getElementById(
        "bottomControls"
    )
    .innerHTML = html;


}





function render(){


    renderControls();



    const container =

        document
        .getElementById(
            "mediaContainer"
        );



    container.innerHTML = "";



    document
    .getElementById(
        "status"
    )
    .textContent = "";



    let shown = 0;




    while(

        shown < PAGE_SIZE

        &&

        currentIndex < workingList.length

    ){



        const item =

            workingList[
                currentIndex
            ];



        currentIndex++;








        const wrapper =

            document
            .createElement(
                "div"
            );


        wrapper.className =
        "media-container";




        const number =

            document
            .createElement(
                "div"
            );


        number.className =
        "media-number";


        number.textContent =
        "#" + item.index;



        wrapper.appendChild(number);





        const heart =

            document
            .createElement(
                "button"
            );



        heart.className =
        "heart-btn";



        heart.dataset.index =
        item.index;



        const isHearted =
heartedItems.has(
    item.index
);



heart.textContent =

    isHearted

    ?

    "❤️"

    :

    "♡";



if(isHearted){

    heart.classList.add(
        "active"
    );

}



        heart.onclick = ()=>{


            toggleHeart(
                item.index
            );


        };



        wrapper.appendChild(heart);





        const link =

            document
            .createElement(
                "a"
            );


        link.href =
        item.url;


        link.target =
        "_blank";


        link.textContent =
        item.url;



        wrapper.appendChild(link);





        markAsSeen(item);

        const media =

            createMediaElement(
                item
            );



        if(media){

            wrapper.appendChild(
                media
            );

        }



        container.appendChild(
            wrapper
        );



        shown++;


    }






}





/* ==========================================================
   RANDOM PAGE SYSTEM
========================================================== */


function nextRandomPage(){


    workingList =
    buildDisplayList();







    shuffleArray(
        workingList
    );



    currentIndex = 0;




    if(
        workingList.length === 0
    ){


        seenItems.clear();


        saveSeen();



        workingList =
        buildDisplayList();



        shuffleArray(
            workingList
        );


        document
        .getElementById(
            "status"
        )
        .textContent =

        "🎉 Cycle complete. Starting again.";


    }



    render();



    snapToTop();


}





/* ==========================================================
   BOTTOM BUTTON BEHAVIOR
========================================================== */


function setupBottomButtons(){


    document
    .getElementById(
        "bottomControls"
    )
    .addEventListener(

        "click",

        ()=>{


            setTimeout(

                snapToTop,

                100

            );


        }

    );


}





/* ==========================================================
   SEARCH LISTENER
========================================================== */


document
.getElementById(
    "searchInput"
)
.addEventListener(

    "input",

    debouncedSearch

);





/* ==========================================================
   START APPLICATION
========================================================== */


fetch(
    "mediaNEW.json"
)

.then(response=>{


    if(!response.ok){


        throw new Error(
            "Could not load mediaNEW.json"
        );


    }



    return response.json();


})

.then(data=>{


    mediaUrls = data.map((url,index)=>({
    url:url,
    index:index+1
}));



    showWelcome();



    setupBottomButtons();



    workingList =
    buildDisplayList();



    currentIndex = 0;



    render();


})

.catch(error=>{


    document
    .getElementById(
        "status"
    )
    .textContent =

    "Error: " + error.message;


});


</script>

</body>

</html>
