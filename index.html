<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="referrer" content="no-referrer">
<title>Media Viewer</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #000;
    color: #e0e0e0;
    margin: 0;
    padding: 0;
}

/* ===== FULL SCREEN MEDIA ===== */
.media-container {
    margin: 0;
    padding: 0;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.media-container img,
.media-container video {
    width: 100vw;
    height: 92vh;
    object-fit: contain;
    background: black;
    margin: 0;
    border-radius: 0;
    box-shadow: none;
    touch-action: pan-x pan-y pinch-zoom;
}

.media-number {
    font-size: 12px;
    opacity: 0.5;
    margin: 8px 0 4px 0;
}

.media-container a {
    font-size: 11px;
    color: #00aaff;
    word-break: break-all;
    margin-bottom: 10px;
}

/* controls */
button {
    padding: 10px 18px;
    margin: 5px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: white;
}

button:hover { background: #45a049; }

.back-btn {
    font-size: 10px;
    padding: 3px 6px;
    opacity: 0.5;
    background: #666;
}

#searchInput {
    width: 90%;
    max-width: 420px;
    padding: 10px;
    margin: 10px 0;
    font-size: 16px;
    border-radius: 6px;
    border: none;
}

#status {
    color: #ff5555;
    font-size: 14px;
    margin-bottom: 10px;
}

/* login */
#loginScreen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#loginBox {
    background: #1f1f1f;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div id="loginBox">
        <h2>Enter Password</h2>
        <input id="passwordInput" type="password" placeholder="Password">
        <br><br>
        <button onclick="checkPassword()">Enter</button>
        <div id="loginError" style="color:red;margin-top:10px;"></div>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h1>Media Viewer</h1>

<input type="text" id="searchInput"
placeholder="Search..."
oninput="debouncedSearch()" />

<div id="topControls"></div>
<div id="status"></div>
<div id="mediaContainer"></div>
<div id="bottomControls"></div>

</div>

<script>

/* ---------- LOGIN ---------- */
function checkPassword() {
    if (document.getElementById("passwordInput").value === "12345") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        document.getElementById("loginError").textContent = "Wrong password";
    }
}

/* ---------- CONFIG ---------- */
const PAGE_SIZE = 20;
const SEARCH_DEBOUNCE_MS = 250;

let mediaUrls = [];
let workingList = [];

let currentIndex = parseInt(localStorage.getItem("currentIndex") || "0");
let searchTimeout = null;
let isRandomMode = false;

let seenItems = new Set(
    JSON.parse(localStorage.getItem("seenItems") || "[]")
);

/* ---------- HELPERS ---------- */
function snapToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function isImage(url) {
    return url.match(/\.(jpeg|jpg|png|gif|webp|heic)/i);
}

function isVideo(url) {
    return url.includes(".mp4") || url.includes("video");
}

/* ---------- MEMORY (RESTORED CORE FEATURE) ---------- */
function markAsSeen(item) {
    if (!item) return;
    seenItems.add(item.index);
}

function saveMemory() {
    localStorage.setItem("seenItems", JSON.stringify([...seenItems]));
    localStorage.setItem("currentIndex", currentIndex);
}

/* ---------- CONTROLS ---------- */
function controlsHTML() {
    const randStyle = isRandomMode ? 'style="background:#9c27b0"' : '';
    const randText = isRandomMode ? "Random: ON" : "Random";

    return `
        <button class="back-btn" onclick="prevPage()">←</button>
        <button onclick="nextPage()">Next ${PAGE_SIZE}</button>
        <button onclick="toggleRandom()" ${randStyle}>${randText}</button>
    `;
}

function renderControls() {
    document.getElementById("topControls").innerHTML = controlsHTML();
    document.getElementById("bottomControls").innerHTML = controlsHTML();
}

/* ---------- NAV ---------- */
function nextPage() {
    if (currentIndex >= workingList.length) currentIndex = 0;
    render();
    snapToTop();
}

function prevPage() {
    currentIndex = Math.max(0, currentIndex - PAGE_SIZE * 2);
    render();
    snapToTop();
}

/* ---------- RANDOM ---------- */
function toggleRandom() {
    const anchor = workingList[currentIndex] || workingList[0];

    isRandomMode = !isRandomMode;

    if (isRandomMode) {
        for (let i = workingList.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [workingList[i], workingList[j]] = [workingList[j], workingList[i]];
        }
        currentIndex = 0;
    } else {
        workingList.sort((a,b) => a.index - b.index);

        if (anchor) {
            const pos = workingList.findIndex(x => x.index === anchor.index);
            currentIndex = pos !== -1 ? pos : 0;
        }
    }

    render();
    snapToTop();
}

/* ---------- RENDER (TRACKING RESTORED PROPERLY) ---------- */
function render() {
    renderControls();

    const container = document.getElementById("mediaContainer");
    container.innerHTML = "";
    document.getElementById("status").textContent = "";

    let shown = 0;

    for (let i = currentIndex; i < workingList.length; i++) {
        const item = workingList[i];
        if (!item) continue;

        // TRACKING RESTORED HERE
        markAsSeen(item);

        const wrap = document.createElement("div");
        wrap.className = "media-container";

        const num = document.createElement("div");
        num.className = "media-number";
        num.textContent = "#" + item.index;
        wrap.appendChild(num);

        const link = document.createElement("a");
        link.href = item.url;
        link.target = "_blank";
        link.textContent = item.url;
        wrap.appendChild(link);

        if (isVideo(item.url)) {
            const v = document.createElement("video");
            v.src = item.url;
            v.controls = true;
            v.playsInline = true;
            wrap.appendChild(v);
        } else if (isImage(item.url)) {
            const img = document.createElement("img");
            img.src = item.url;
            wrap.appendChild(img);
        }

        container.appendChild(wrap);

        shown++;
        if (shown >= PAGE_SIZE) break;
    }

    currentIndex += shown;

    // SAVE BOTH TRACKING SYSTEMS
    saveMemory();
}

/* ---------- SEARCH ---------- */
function applySearch() {
    const q = document.getElementById("searchInput").value.toLowerCase();

    workingList = mediaUrls.map((url, i) => ({
        url,
        index: i + 1
    }));

    if (q) {
        const num = q.replace("#","");
        workingList = workingList.filter(x =>
            x.url.toLowerCase().includes(q) ||
            x.index == num
        );
    }

    render();
}

function debouncedSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(applySearch, SEARCH_DEBOUNCE_MS);
}

/* ---------- INIT ---------- */
fetch("mediaNEW.json")
.then(r => r.json())
.then(data => {
    mediaUrls = data;
    workingList = data.map((url,i)=>({url,index:i+1}));
    render();
});
</script>

</body>
</html>
