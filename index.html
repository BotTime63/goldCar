<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="referrer" content="no-referrer">
<title>Media Viewer</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #000;
    color: #e0e0e0;
    margin: 0;
    padding: 0;
}

/* ===== FULL SCREEN MEDIA ===== */
.media-container {
    margin: 0;
    padding: 0;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.media-container img,
.media-container video {
    width: 100vw;
    height: 92vh;
    object-fit: contain;
    background: black;
    margin: 0;
    border-radius: 0;
}

.media-number {
    font-size: 12px;
    opacity: 0.5;
    margin: 8px 0 4px 0;
}

.media-container a {
    font-size: 11px;
    color: #00aaff;
    word-break: break-all;
    margin-bottom: 10px;
}

/* buttons */
button {
    padding: 10px 18px;
    margin: 5px;
    font-size: 14px;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: white;
}

button:hover { background: #45a049; }

#status {
    color: #ff5555;
    font-size: 14px;
    margin-bottom: 10px;
}

/* login */
#loginScreen {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#loginBox {
    background: #1f1f1f;
    padding: 20px;
    border-radius: 10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
    <div id="loginBox">
        <h2>Enter Password</h2>
        <input id="passwordInput" type="password" placeholder="Password">
        <br><br>
        <button onclick="checkPassword()">Enter</button>
        <div id="loginError" style="color:red;margin-top:10px;"></div>
    </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<h1>Media Viewer</h1>

<div>
    <button onclick="nextRandomPage()">Random Page</button>
    <button onclick="resetMemory()">Reset</button>
</div>

<div id="status"></div>
<div id="mediaContainer"></div>

</div>

<script>

/* ---------- LOGIN ---------- */
function checkPassword() {
    if (document.getElementById("passwordInput").value === "12345") {
        document.getElementById("loginScreen").style.display = "none";
        document.getElementById("app").style.display = "block";
    } else {
        document.getElementById("loginError").textContent = "Wrong password";
    }
}

/* ---------- CONFIG ---------- */
const PAGE_SIZE = 20;

let mediaUrls = [];
let seenItems = new Set(JSON.parse(localStorage.getItem("seenItems") || "[]"));

function saveMemory() {
    localStorage.setItem("seenItems", JSON.stringify([...seenItems]));
}

/* ---------- HELPERS ---------- */
function isImage(url) {
    return url.match(/\.(jpeg|jpg|png|gif|webp|heic)/i);
}

function isVideo(url) {
    return url.includes(".mp4") || url.includes("video");
}

/* ---------- CORE RANDOM PAGE SYSTEM ---------- */
function nextRandomPage() {

    const remaining = mediaUrls
        .map((url, i) => ({ url, index: i + 1 }))
        .filter(item => !seenItems.has(item.index));

    if (remaining.length === 0) {
        document.getElementById("status").textContent =
            "🎉 All content viewed. Reset to restart.";
        return;
    }

    const page = [];
    for (let i = 0; i < PAGE_SIZE && remaining.length > 0; i++) {
        const idx = Math.floor(Math.random() * remaining.length);
        const item = remaining.splice(idx, 1)[0];
        page.push(item);
        seenItems.add(item.index);
    }

    saveMemory();
    renderPage(page);
}

/* ---------- RENDER PAGE ---------- */
function renderPage(page) {
    const container = document.getElementById("mediaContainer");
    container.innerHTML = "";
    document.getElementById("status").textContent = "";

    page.forEach(item => {
        const wrap = document.createElement("div");
        wrap.className = "media-container";

        const num = document.createElement("div");
        num.className = "media-number";
        num.textContent = "#" + item.index;
        wrap.appendChild(num);

        const link = document.createElement("a");
        link.href = item.url;
        link.target = "_blank";
        link.textContent = item.url;
        wrap.appendChild(link);

        if (isVideo(item.url)) {
            const v = document.createElement("video");
            v.src = item.url;
            v.controls = true;
            v.playsInline = true;
            wrap.appendChild(v);

        } else if (isImage(item.url)) {
            const img = document.createElement("img");
            img.src = item.url;
            wrap.appendChild(img);
        }

        container.appendChild(wrap);
    });
}

/* ---------- RESET ---------- */
function resetMemory() {
    if (!confirm("Reset all viewed items?")) return;

    seenItems.clear();
    localStorage.removeItem("seenItems");

    document.getElementById("status").textContent = "Reset complete.";
    nextRandomPage();
}

/* ---------- INIT ---------- */
fetch("mediaNEW.json")
.then(r => r.json())
.then(data => {
    mediaUrls = data;
    nextRandomPage();
});
</script>

</body>
</html>
